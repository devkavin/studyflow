services:
  app:
    build: .
    env_file: .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.studyflow.rule=Host(`solidscalelabs.studyflow.com`)
      - traefik.http.routers.studyflow.entrypoints=websecure
      - traefik.http.routers.studyflow.tls.certresolver=letsencrypt
      - traefik.http.services.studyflow.loadbalancer.server.port=8000
    networks: [proxy, internal]
    command: >-
      sh -c '
      until php -r "try { new PDO(\"pgsql:host=${DB_HOST};port=${DB_PORT};dbname=${DB_DATABASE}\", \"${DB_USERNAME}\", \"${DB_PASSWORD}\"); } catch (Exception $e) { exit(1); }"; do
        echo "Waiting for PostgreSQL to be ready...";
        sleep 2;
      done;
      php artisan serve --host=0.0.0.0 --port=8000'
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
volumes: { pgdata: {} }
networks:
  proxy: { external: true }
  internal: {}
