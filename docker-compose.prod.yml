services:
  app:
    build:
      context: .
      target: production
    container_name: studyflow-app-prod
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cpus: 2.5
    mem_limit: 2g
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: studyflow-web-prod
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.studyflow.rule=Host(`solidscalelabs.studyflow.com`)
      - traefik.http.routers.studyflow.entrypoints=websecure
      - traefik.http.routers.studyflow.tls.certresolver=letsencrypt
      - traefik.http.services.studyflow.loadbalancer.server.port=80
    networks:
      - proxy
      - internal
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cpus: 0.5
    mem_limit: 256m
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: studyflow-db-prod
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command:
      [
        "postgres",
        "-c", "max_connections=100",
        "-c", "shared_buffers=768MB",
        "-c", "effective_cache_size=2304MB",
        "-c", "maintenance_work_mem=256MB",
        "-c", "work_mem=16MB",
        "-c", "wal_compression=on",
      ]
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cpus: 1.5
    mem_limit: 3g
    restart: unless-stopped

volumes:
  pgdata_prod:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
