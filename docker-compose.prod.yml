services:
  app:
    build:
      context: .
      target: production
    container_name: studyflow-app-prod
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cpus: 2.5
    mem_limit: 2g
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    container_name: studyflow-web-prod
    depends_on:
      app:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.studyflow-http.rule=Host(`${APP_HOST:-studyflow.135.181.33.50.sslip.io}`)
      - traefik.http.routers.studyflow-http.entrypoints=web
      - traefik.http.routers.studyflow-http.middlewares=studyflow-https-redirect
      - traefik.http.routers.studyflow-https.rule=Host(`${APP_HOST:-studyflow.135.181.33.50.sslip.io}`)
      - traefik.http.routers.studyflow-https.entrypoints=websecure
      - traefik.http.routers.studyflow-https.tls.certresolver=letsencrypt
      - traefik.http.routers.studyflow-https.service=studyflow
      - traefik.http.middlewares.studyflow-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.studyflow-https-redirect.redirectscheme.permanent=true
      - traefik.http.services.studyflow.loadbalancer.server.port=80
    networks:
      - proxy
      - internal
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cpus: 0.5
    mem_limit: 256m
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: studyflow-db-prod
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required in .env}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
    command:
      [
        "postgres",
        "-c", "max_connections=100",
        "-c", "shared_buffers=768MB",
        "-c", "effective_cache_size=2304MB",
        "-c", "maintenance_work_mem=256MB",
        "-c", "work_mem=16MB",
        "-c", "wal_compression=on",
      ]
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required in .env} -d ${DB_DATABASE:?DB_DATABASE is required in .env}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cpus: 1.5
    mem_limit: 3g
    restart: unless-stopped

volumes:
  pgdata_prod:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
