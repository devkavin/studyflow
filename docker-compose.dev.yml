services:
  app:
    build: .
    command: sh -c "php artisan migrate && php artisan serve --host=0.0.0.0 --port=8000"
    ports: ["8000:8000"]
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: studyflow
      DB_USERNAME: studyflow
      DB_PASSWORD: studyflow
    depends_on: [db]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyflow
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow
    volumes: ["pgdata:/var/lib/postgresql/data"]
volumes:
  pgdata:
